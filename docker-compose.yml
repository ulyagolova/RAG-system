version: "3.8"

services:
  postgresql:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: rag_recommendations
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  rag-app:
    build: .
    depends_on:
      - postgresql
      - qdrant
    environment:
      - ENVIRONMENT=production
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  backend-app:
    build:
      context: .
    ports:
      - "8080:8080"
    depends_on:
      - rag-app

volumes:
  postgres_data:
  qdrant_data:
